<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ainager - Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 70%, #020617 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Starfield Animation */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        

        
        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #22d3ee, #a855f7);
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }
        
        /* Text Animations */
        .fade-in {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
        }
        
        .fade-in-delay-1 { animation-delay: 0.5s; }
        .fade-in-delay-2 { animation-delay: 1s; }
        .fade-in-delay-3 { animation-delay: 1.5s; }
        .fade-in-delay-4 { animation-delay: 2s; }
        .fade-in-delay-5 { animation-delay: 2.5s; }
        .fade-in-delay-6 { animation-delay: 3s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #22d3ee, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Progress Bar */
        .progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px auto;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            border-radius: 2px;
            width: 0%;
            animation: progressFill 2s ease-out 1s forwards;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
        
        @keyframes progressFill {
            to { width: 80%; }
        }
        
        /* Email Link Hover */
        .email-link {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .email-link:hover {
            color: #22d3ee;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
        
        .email-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            transition: width 0.3s ease;
        }
        
        .email-link:hover::after {
            width: 100%;
        }
        
        /* Logo */
        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #22d3ee, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
            z-index: 10;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .progress-container {
                width: 250px;
            }
            
            .logo {
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .progress-container {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo fade-in">A</div>
    
    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>
    
    <!-- Floating Particles -->
    <div id="particles"></div>
    
    <!-- Main Content -->
    <div class="relative z-10 flex items-center justify-center min-h-screen px-4">
        <div class="text-center">

            
            <!-- Content -->
            <div class="space-y-6">
                <h1 class="text-5xl md:text-6xl font-bold gradient-text tracking-widest fade-in">
                    Ainager
                </h1>
                
                <p class="text-xl md:text-2xl text-slate-300 font-light fade-in fade-in-delay-1">
                    your ai(ma)nager in 30 seconds
                </p>
                
                <h2 class="text-4xl md:text-5xl font-bold text-white tracking-[0.2em] fade-in fade-in-delay-2">
                    COMING SOON
                </h2>
                
                <!-- Progress Bar -->
                <div class="fade-in fade-in-delay-3">
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <!-- <p class="text-sm text-slate-400 mt-2">62% Complete</p> -->
                </div>
                
                <p class="text-lg text-slate-300 fade-in fade-in-delay-4">
                    Launching in October 2025
                </p>
                
                <a href="mailto:muhsin@ainager.com" 
                   class="email-link text-lg text-slate-400 hover:text-cyan-400 transition-colors duration-300 fade-in fade-in-delay-5">
                    muhsin@ainager.com
                </a>
            </div>
        </div>
    </div>

    <script>
        // Generate Stars
        function createStars() {
            const starfield = document.getElementById('starfield');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                // Random size
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Random animation delay
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starfield.appendChild(star);
            }
        }
        
        // Generate Floating Particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random position
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                // Random animation delay
                particle.style.animationDelay = Math.random() * 4 + 's';
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Mouse Parallax Effect
        function initParallax() {
            const particles = document.querySelectorAll('.particle');
            
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth;
                const mouseY = e.clientY / window.innerHeight;
                
                particles.forEach((particle, index) => {
                    const speed = (index + 1) * 0.5;
                    const x = (mouseX - 0.5) * speed;
                    const y = (mouseY - 0.5) * speed;
                    
                    particle.style.transform = `translate(${x}px, ${y}px)`;
                });
            });
        }
        
        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            createParticles();
            initParallax();
        });
        
        // Smooth scrolling for any anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
